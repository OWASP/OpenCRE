---
name: Lint Code Base

on: [push, pull_request]
jobs:
  frontend:
    name: Frontend Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
      - name: Install frontend dependencies
        run: |
          for i in 1 2 3; do
            yarn install --frozen-lockfile --network-timeout 120000 && exit 0
            echo "yarn install failed (attempt $i/3), retrying..."
            sleep $((i * 10))
          done
          echo "yarn install failed after 3 attempts"
          exit 1
      - name: Check frontend formatting
        run: yarn prettier --check "application/frontend/src/**/*.{ts,tsx,js}"

  build:
    name: Lint Code Base
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Lint Code Base
        uses: github/super-linter@v6
        env:
          VALIDATE_PYTHON_BLACK: true
          VALIDATE_ALL_CODEBASE: false
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
