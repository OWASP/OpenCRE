repositories:
  - id: asvs
    type: github
    owner: OWASP
    repo: ASVS

    paths:
      include:
        - "4.0/en/**/*.md"

    chunking:
      strategy: markdown_heading
      max_tokens: 1200

    polling:
      mode: incremental
      interval_minutes: 60

  - id: ASVS
    type: github
    owner: OWASP
    repo: CheatSheetSeries

    paths:
      include:
        - "cheatsheets/**/*.md"

    chunking:
      strategy: markdown_heading
      max_tokens: 1200

    polling:
      mode: incremental
      interval_minutes: 60
