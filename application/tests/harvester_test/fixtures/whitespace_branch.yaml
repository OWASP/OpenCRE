repositories:
  - id: whitespace-branch
    type: github
    owner: OWASP
    repo: ASVS
    branch: " "
    paths:
      include:
        - "docs/**/*.md"
    chunking:
      strategy: markdown_heading
      max_tokens: 1200
      overlap_tokens: 100
    polling:
      mode: incremental
      interval_minutes: 60
